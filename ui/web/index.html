<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nirmiq Echo</title>
<style>
:root{
  --surface-base:#0d0f11; --surface-raised:#13161a; --surface-overlay:#1a1e24;
  --surface-hover:#1e2329; --surface-active:#22272f;
  --border-subtle:rgba(255,255,255,.06); --border-default:rgba(255,255,255,.10);
  --border-strong:rgba(255,255,255,.18);
  --text-primary:#e8eaed; --text-secondary:#9aa3b0; --text-muted:#5c6470; --text-inverse:#0d0f11;
  --accent:#4a9eff; --accent-dim:rgba(74,158,255,.15); --accent-subtle:rgba(74,158,255,.08);
  --status-listening:#4a9eff; --status-thinking:#a78bfa; --status-executing:#34d399;
  --status-warning:#fbbf24; --status-error:#f87171; --status-idle:#5c6470;
  --font-ui:'Inter',system-ui,sans-serif; --font-mono:'JetBrains Mono','Fira Code',monospace;
  --space-2:8px; --space-3:12px; --space-4:16px; --radius-md:6px; --radius-lg:8px;
  --duration-normal:150ms; --ease-default:cubic-bezier(.2,0,0,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--surface-base);color:var(--text-primary);font-family:var(--font-ui);
  font-size:13px;height:100vh;overflow:hidden}
.app{display:grid;grid-template-rows:40px 1fr 48px;height:100vh}

.topbar{display:flex;align-items:center;gap:var(--space-3);padding:0 var(--space-4);
  background:var(--surface-raised);border-bottom:1px solid var(--border-subtle)}
.brand{font-weight:600;letter-spacing:.3px}
.mode{font-size:11px;color:var(--accent);background:var(--accent-subtle);
  padding:3px 8px;border-radius:var(--radius-md);text-transform:uppercase;letter-spacing:.5px}
.spacer{flex:1}
.stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--status-idle);transition:background var(--duration-normal)}
.dot.on{background:var(--status-executing)} .dot.off{background:var(--status-error)}
.dot.listening{background:var(--status-listening);box-shadow:0 0 0 3px var(--accent-dim)}

.body{display:grid;grid-template-columns:1fr 260px;overflow:hidden}
.main{padding:var(--space-4);overflow-y:auto}
.side{background:var(--surface-raised);border-left:1px solid var(--border-subtle);
  padding:var(--space-4);overflow-y:auto}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text-muted);margin:var(--space-4) 0 var(--space-2)}
.section-label:first-child{margin-top:0}

.transcript{font-size:16px;line-height:1.5;min-height:48px;color:var(--text-primary)}
.transcript .cursor{display:inline-block;width:2px;height:18px;background:var(--accent);
  vertical-align:-3px;animation:blink 1s steps(2) infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.muted{color:var(--text-muted)}

.plan{display:flex;flex-direction:column;gap:6px}
.step{display:flex;align-items:center;gap:var(--space-2);font-size:13px;
  padding:6px 8px;border-radius:var(--radius-md);background:var(--surface-raised)}
.step .ic{width:16px;text-align:center;font-family:var(--font-mono)}
.step.success .ic{color:var(--status-executing)} .step.running .ic{color:var(--accent)}
.step.failed .ic{color:var(--status-error)} .step.pending .ic{color:var(--text-muted)}
.step.awaiting_confirmation .ic{color:var(--status-warning)}

.response{background:var(--surface-raised);border:1px solid var(--border-subtle);
  border-radius:var(--radius-lg);padding:var(--space-3);color:var(--text-primary);font-size:14px}

.feed{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);
  display:flex;flex-direction:column;gap:3px}
.feed .row{display:flex;gap:8px} .feed .t{color:var(--text-muted)}

.chip{font-size:12px;color:var(--text-secondary);padding:4px 0;border-bottom:1px solid var(--border-subtle)}

.bottombar{display:flex;align-items:center;gap:var(--space-2);padding:0 var(--space-4);
  background:var(--surface-raised);border-top:1px solid var(--border-subtle)}
button{font-family:inherit;font-size:13px;color:var(--text-primary);background:var(--surface-active);
  border:1px solid var(--border-default);border-radius:var(--radius-md);padding:7px 14px;
  cursor:pointer;transition:background var(--duration-normal)}
button:hover{background:var(--surface-hover)}
button.accent{background:var(--accent);color:var(--text-inverse);border-color:var(--accent)}
#cmd{flex:1;background:var(--surface-base);border:1px solid var(--border-default);
  border-radius:var(--radius-md);color:var(--text-primary);padding:8px 12px;font-size:13px;outline:none}
#cmd:focus{border-color:var(--accent)}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;
  justify-content:center;z-index:10}
.overlay.show{display:flex}
.modal{background:var(--surface-overlay);border:1px solid var(--border-strong);
  border-radius:var(--radius-lg);padding:var(--space-4);width:380px}
.modal h3{margin-bottom:var(--space-2)} .modal p{color:var(--text-secondary);margin-bottom:var(--space-4)}
.modal .row{display:flex;gap:var(--space-2);justify-content:flex-end}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="dot" id="conn"></span>
    <span class="brand">Nirmiq Echo</span>
    <span class="mode" id="mode">Assistant Mode</span>
    <span class="spacer"></span>
    <span class="stat"><span class="dot" id="micDot"></span>Mic</span>
    <span class="stat"><span class="dot" id="llmDot"></span><span id="modelName">model</span></span>
  </div>

  <div class="body">
    <div class="main">
      <div class="section-label">Live Transcript</div>
      <div class="transcript" id="transcript"><span class="muted">Say or type a command…</span><span class="cursor"></span></div>

      <div class="section-label">Execution Plan</div>
      <div class="plan" id="plan"><span class="muted">No active plan.</span></div>

      <div class="section-label">Response</div>
      <div class="response" id="response"><span class="muted">—</span></div>

      <div class="section-label">Activity Feed</div>
      <div class="feed" id="feed"></div>
    </div>

    <div class="side">
      <div class="section-label">Recent Commands</div>
      <div id="recent"><span class="muted">—</span></div>
      <div class="section-label">Tools</div>
      <div id="tools"><span class="muted">—</span></div>
    </div>
  </div>

  <div class="bottombar">
    <input id="cmd" placeholder="Type a command and press Enter (e.g. open calculator, what is 50 times 4)…" />
    <button class="accent" id="send">Send</button>
    <button id="mute">Mic</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Confirm Action</h3>
    <p id="confirmMsg">—</p>
    <div class="row">
      <button id="cancel">Cancel</button>
      <button class="accent" id="approve">Yes, do it</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const stepIcon = {success:"✓",running:"⟳",pending:"○",failed:"✗",
  skipped:"–",awaiting_confirmation:"?"};
let steps = {}, pendingPlan = null;
const HTTP = location.origin;
const WS = (location.origin.replace("http","ws")) + "/ws";

function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }
function setTranscript(text){
  const el=$("transcript"); el.textContent=text||"";
  const c=document.createElement("span"); c.className="cursor"; el.appendChild(c);
}
function feed(msg){
  const row=document.createElement("div"); row.className="row";
  const t=document.createElement("span"); t.className="t"; t.textContent=new Date().toLocaleTimeString();
  const m=document.createElement("span"); m.textContent=msg;
  row.append(t,m);
  const f=$("feed"); f.prepend(row);
  while(f.childNodes.length>50) f.removeChild(f.lastChild);
}
function renderPlan(plan){
  steps={}; const el=$("plan"); el.innerHTML="";
  plan.steps.forEach(s=>{
    const d=document.createElement("div"); d.className="step "+s.status;
    const ic=document.createElement("span"); ic.className="ic"; ic.textContent=stepIcon[s.status]||"○";
    const tx=document.createElement("span"); tx.textContent=`${s.step_number}. ${s.description||s.tool_name}`;
    d.append(ic,tx); el.appendChild(d); steps[s.step_id]=d;
  });
}
function connect(){
  const ws=new WebSocket(WS);
  ws.onopen=()=>{ $("conn").className="dot on"; feed("connected to backend"); };
  ws.onclose=()=>{ $("conn").className="dot off"; setTimeout(connect,1500); };
  ws.onmessage=e=>{
    const m=JSON.parse(e.data), p=m.payload||{};
    switch(m.event){
      case "system.status":
        $("llmDot").className="dot "+(p.llm?"on":"off");
        $("micDot").className="dot "+(p.mic?"on":"off");
        if(p.model_name) $("modelName").textContent=p.model_name;
        break;
      case "voice.state_change":
        $("micDot").className="dot "+(p.state==="idle"?"on":"listening");
        feed("voice: "+p.state); break;
      case "transcript.final":
        setTranscript(p.text); feed("heard: "+p.text); break;
      case "plan.created":
        renderPlan(p.plan); feed(`plan created (${p.plan.steps.length} steps)`); break;
      case "plan.step_update":
        if(steps[p.step_id]){ steps[p.step_id].className="step "+p.status;
          steps[p.step_id].querySelector(".ic").textContent=stepIcon[p.status]||"○"; }
        break;
      case "plan.completed":
        feed("plan "+(p.success?"completed":"failed")); break;
      case "response.text":
        if(p.text){ $("response").textContent=p.text; } break;
      case "confirmation.required":
        pendingPlan=p.plan_id; $("confirmMsg").textContent=p.message||p.action_summary||"Proceed?";
        $("overlay").className="overlay show"; break;
      case "timer.fired":
        feed("⏰ timer fired: "+(p.label||"")); break;
    }
  };
  window._ws=ws;
}
function send(text){
  if(!text.trim()) return;
  setTranscript(text);
  fetch(HTTP+"/intent",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text,mode:"assistant"})});
  feed("sent: "+text);
}
$("send").onclick=()=>{ send($("cmd").value); $("cmd").value=""; };
$("cmd").addEventListener("keydown",e=>{ if(e.key==="Enter"){ send($("cmd").value); $("cmd").value=""; }});
$("approve").onclick=()=>{ fetch(HTTP+"/confirm",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({plan_id:pendingPlan,confirmed:true})}); $("overlay").className="overlay"; };
$("cancel").onclick=()=>{ fetch(HTTP+"/confirm",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({plan_id:pendingPlan,confirmed:false})}); $("overlay").className="overlay"; };

async function loadSide(){
  try{
    const tools=await (await fetch(HTTP+"/tools")).json();
    $("tools").innerHTML=tools.map(t=>`<div class="chip">${esc(t.name)}</div>`).join("");
    const rec=await (await fetch(HTTP+"/commands/recent")).json();
    $("recent").innerHTML=rec.length?rec.map(r=>`<div class="chip">${esc(r.raw_input)}</div>`).join(""):
      '<span class="muted">none yet</span>';
  }catch(e){}
}
connect(); loadSide(); setInterval(loadSide,5000);
</script>
</body>
</html>

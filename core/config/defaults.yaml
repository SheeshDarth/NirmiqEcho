# Nirmiq Echo — default configuration. User overrides live in ~/.nirmiq-echo
log_level: INFO

voice:
  whisper_model: small.en      # GPU auto-upgrades to large-v3 at runtime
  sample_rate: 16000
  silence_timeout_s: 1.5
  wake_word: nirmiq
  wake_confidence: 0.5
  noise_suppression: true

models:
  ollama_endpoint: http://localhost:11434
  command_model: qwen3.5:4b
  planning_model: qwen3.5:4b
  reasoning_model: mistral:7b-instruct-q4_K_M

server:
  host: 127.0.0.1
  ws_port: 8765
  http_port: 8766
